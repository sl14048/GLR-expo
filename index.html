<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLR EXPO</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

    <div class="banner-container">
        <img src="Frame0TV.svg" class="bg-layer" alt="Base Frame">

        <div class="stage-container">

            <div id="logoGroup" class="logo-group-unified">
                <img id="glrLogo" src="GLR logo.svg" alt="GLR Logo" class="hidden-asset">
                <img id="logoEpo" src="logo epo.svg" alt="EXPO Base" class="hidden-asset white-svg-filter">
                <img id="letterX" src="X.svg" alt="Letter X">
            </div>

            <div id="textGroup" class="text-group hidden-asset">
                <div class="outline-text">Kom kijken naar de</div>
                <div class="outline-text">makers</div>
                <div class="outline-text">van nu en de</div>
                <div class="outline-text">toekomst!</div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
